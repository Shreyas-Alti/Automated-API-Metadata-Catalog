name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Step 1: lint (ESLint + architecture boundary lint)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm run lint
      - name: Architecture boundary lint
        run: pnpm run arch:lint

  # Step 2: unit tests (all packages, all modules)
  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm run test:unit

  # Step 3: integration tests (requires Postgres + Redis)
  integration-tests:
    name: Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: api_catalog_test
          POSTGRES_USER: api_catalog
          POSTGRES_PASSWORD: api_catalog_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - '5432:5432'
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - '6379:6379'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run integration tests
        run: pnpm run test:integration
        env:
          DATABASE_URL: postgresql://api_catalog:api_catalog_dev@localhost:5432/api_catalog_test
          REDIS_URL: redis://localhost:6379

  # Step 4: golden-repo regression tests (per-parser, expected output fixtures)
  golden-repo-tests:
    name: Golden-Repo Regression Tests
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run golden-repo tests
        run: pnpm run test:golden

  # Step 5: build (all packages must compile cleanly)
  build:
    name: Build
    needs: golden-repo-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm run build

  # E2E tests — release branches only (added in Phase 2)
  # e2e-tests:
  #   name: E2E Tests
  #   needs: build
  #   if: github.ref == 'refs/heads/main'
  #   ...
